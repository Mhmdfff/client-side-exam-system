<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>דף סטודנט</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="main-header">
    <h1>דף ראשי לסטודנט</h1>
    <p>מבחנים וציונים</p>
  </header>

  <main class="container">

    <section class="card">
      <h2>ברוך הבא, <span id="studentName"></span></h2>
      <p>כאן ניתן לחפש מבחנים, לבצע מבחנים ולראות ציונים.</p>

      <a href="search-exam.html" class="btn">חיפוש מבחן</a>
      <button id="logoutBtn" class="btn btn-danger">התנתקות</button>
    </section>

    <section class="card">
      <h2>ממוצע ציונים</h2>
      <p id="averageGrade">עדיין אין ציונים.</p>
    </section>

    <section class="card">
      <h2>היסטוריית מבחנים</h2>
      <div id="studentResultsList"></div>
    </section>

  </main>

  <script type="module" src="js/studentDashboard.js"></script>
</body>
</html>
