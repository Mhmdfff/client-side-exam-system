<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הרשמה</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="main-header">
    <h1>הרשמה למערכת</h1>
    <p>יצירת חשבון חדש</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>טופס הרשמה</h2>

      <form id="registerForm">
        <label>שם מלא</label>
        <input type="text" id="name" required>

        <label>אימייל</label>
        <input type="email" id="email" required>

        <label>סיסמה</label>
        <input type="password" id="password" required minlength="4">

        <label>סוג משתמש</label>
        <select id="role" required>
          <option value="">בחר סוג משתמש</option>
          <option value="teacher">מורה</option>
          <option value="student">סטודנט</option>
        </select>

        <button type="submit" class="btn">הרשמה</button>
      </form>

      <p>
        כבר יש לך חשבון?
        <a href="login.html">התחבר כאן</a>
      </p>

      <a href="index.html">חזרה לדף הראשי</a>
    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
